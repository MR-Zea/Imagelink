<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Gallery Upload</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}
h1 {
  margin: 20px;
}
.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}
.gallery img {
  width: 200px;
  margin: 10px;
  border-radius: 10px;
  transition: 0.3s;
}
.gallery img:hover {
  transform: scale(1.05);
}
</style>
</head>
<body>

<h1>Gallery Gambar</h1>

<div class="gallery" id="gallery"></div>

<script>
// GANTI INI
const USER = "MR-Zea";
const REPO = "imagelink";
const FOLDER = "uploads";

async function loadImages() {
  const api = `https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`;

  const res = await fetch(api);
  const data = await res.json();

  const gallery = document.getElementById("gallery");

  data.forEach(file => {
    if (file.type === "file") {
      const img = document.createElement("img");
      img.src = file.download_url;
      gallery.appendChild(img);
    }
  });
}

loadImages();
</script>

</body>
</html>
